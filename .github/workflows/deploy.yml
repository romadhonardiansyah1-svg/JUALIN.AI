name: JUALIN.AI — CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.15"

      - name: Install backend deps
        run: |
          cd backend
          pip install torch==2.13.0 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pip-audit

      - name: Compile backend
        run: python -m compileall backend

      - name: Run backend tests with disposable PostgreSQL
        run: |
          cd backend
          python -m scripts.run_with_disposable_database -- python -m unittest discover -s tests -v

      - name: Offline Proof Mode (backend suite)
        run: |
          cd backend
          python -m scripts.proof_mode run-all --suite backend --seed 42 --output ../artifacts/proof-backend.json
          python -c "import json,sys; p=json.load(open('../artifacts/proof-backend.json')); print(p['status'], p['commit_sha'], p['summary']); sys.exit(0 if p['status']=='passed' else 1)"

      - name: Upload Proof Mode artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proof-backend
          path: artifacts/proof-backend.json
          if-no-files-found: warn

      - name: Python dependency audit
        run: |
          cd backend
          python -m pip_audit -r requirements.txt

      - name: Docker Compose config validation
        run: docker compose config --quiet

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        run: |
          cd frontend
          npm ci
          npm audit --audit-level=high
          npm run lint
          npm run build


