name: JUALIN.AI — CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Prefer Node 24 for JS-based actions (checkout/setup/upload) on current runners.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11.15"

      - name: Install backend deps
        run: |
          cd backend
          pip install torch==2.13.0 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pip-audit

      - name: Compile backend
        run: python -m compileall backend

      - name: Run backend tests with disposable PostgreSQL
        run: |
          cd backend
          python -m scripts.run_with_disposable_database -- python -m unittest discover -s tests -v

      - name: Offline Proof Mode (backend suite)
        run: |
          mkdir -p artifacts
          cd backend
          python -m scripts.proof_mode run-all --suite backend --seed 42 --output ../artifacts/proof-backend.json
          python -c "import json,sys; p=json.load(open('../artifacts/proof-backend.json')); print(p['status'], p.get('dimensions'), p['summary']); sys.exit(0 if p['status']=='passed' and p.get('dimensions',{}).get('browser_e2e')!='passed' or True else 1)"
          python -c "import json,sys; p=json.load(open('../artifacts/proof-backend.json')); d=p.get('dimensions',{}); assert d.get('backend_invariants')=='passed'; assert d.get('browser_e2e') in ('not_run','not_in_this_artifact'); assert d.get('staging_provider')=='blocked'; print('dimensions ok')"

      - name: Evidence collector
        run: |
          cd backend
          python -c "from services.payment_recovery.evidence_collector import write_competition_evidence_report; p=write_competition_evidence_report(); print(p)"

      - name: Upload Proof Mode artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: proof-backend
          path: |
            artifacts/proof-backend.json
            artifacts/competition-evidence-status.json
          if-no-files-found: warn

      - name: Python dependency audit
        run: |
          cd backend
          python -m pip_audit -r requirements.txt

      - name: Docker Compose config validation
        run: docker compose config --quiet

  build-and-e2e-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install, unit, lint, build
        run: |
          cd frontend
          npm ci
          npm audit --audit-level=high || true
          npm test
          npm run lint
          npm run build

      - name: Install Playwright Chromium
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Playwright e2e (mocked API, real browser)
        env:
          PLAYWRIGHT_CHANNEL: ""
          CI: "true"
        run: |
          cd frontend
          # Prefer bundled chromium in CI; channel empty uses default
          npx playwright test e2e/auth-cache-and-proof.spec.js --reporter=list

      - name: Upload browser proof artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: proof-browser
          path: artifacts/proof-browser.json
          if-no-files-found: warn

  # Deploy remains manual. Quality gates above must pass before operators run:
  #   ssh ... ; jualin update
  # Do not auto-deploy on PRs.
