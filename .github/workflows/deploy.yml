name: JUALIN.AI — CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: jualin
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: jualin_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jualin -d jualin_ai_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pip-audit

      - name: Compile backend
        run: python -m compileall backend

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short
        env:
          DATABASE_URL: "postgresql+asyncpg://jualin:test_password@localhost:5432/jualin_ai_test"
          REDIS_URL: "redis://localhost:6379/0"

      - name: Python dependency audit
        run: |
          cd backend
          python -m pip_audit -r requirements.txt

      - name: Docker Compose config validation
        run: docker compose config --quiet

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        run: |
          cd frontend
          npm ci
          npm audit --audit-level=high
          npm run lint
          npm run build

  deploy:
    needs: [test, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /app/jualin-ai
            git pull origin main
            docker compose build
            docker compose up -d
            echo "✅ Deployed successfully"
