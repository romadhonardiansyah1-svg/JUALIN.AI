name: JUALIN.AI — CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: jualin
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: jualin_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jualin -d jualin_ai_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: |
          cd backend
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pytest pip-audit

      - name: Compile backend
        run: python -m compileall backend

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short
        env:
          DATABASE_URL: "postgresql+asyncpg://jualin:test_password@localhost:5432/jualin_ai_test"
          REDIS_URL: "redis://localhost:6379/0"

      - name: Python dependency audit
        run: |
          cd backend
          python -m pip_audit -r requirements.txt --ignore-vuln CVE-2025-3000

      - name: Docker Compose config validation
        run: docker compose config --quiet

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        run: |
          cd frontend
          npm ci
          npm audit --audit-level=high
          npm run lint
          npm run build


  # ── Deploy ──
  # Deploy secara manual dari VPS:
