# ═══════════════════════════════════════════
# JUALIN.AI — Docker Compose (Full Stack)
# 
# Development: docker compose up -d
# Production:  docker compose --profile production up -d
# ═══════════════════════════════════════════
services:
  # ── PostgreSQL + pgvector ──
  db:
    image: pgvector/pgvector:pg16
    container_name: jualin-db
    restart: always
    environment:
      POSTGRES_USER: jualin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jualin_secure_2026}
      POSTGRES_DB: jualin_ai
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jualin -d jualin_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: jualin-redis
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Apply versioned schema migrations before application services start.
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jualin-migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://jualin:${DB_PASSWORD:-jualin_secure_2026}@db:5432/jualin_ai
      AUTO_CREATE_TABLES: "false"
    working_dir: /workspace
    command: ["python", "-m", "alembic", "-c", "alembic.ini", "upgrade", "head"]
    volumes:
      - ./alembic.ini:/workspace/alembic.ini:ro
      - ./backend:/workspace/backend:ro

  # ── Backend (FastAPI) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jualin-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://jualin:${DB_PASSWORD:-jualin_secure_2026}@db:5432/jualin_ai
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-jualin-secret-change-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-secret-change-in-production}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:20128/v1}
      LLM_API_KEY: ${LLM_API_KEY:-not-needed}
      LLM_MODEL: ${LLM_MODEL:-llama-3.1-8b-instant}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost","https://${DOMAIN:-jualan-ai.cloud}","https://www.${DOMAIN:-jualan-ai.cloud}"]'
      BASE_URL: ${BASE_URL:-https://${DOMAIN:-jualan-ai.cloud}}
      FRONTEND_URL: ${FRONTEND_URL:-https://${DOMAIN:-jualan-ai.cloud}}
      DEBUG: ${DEBUG:-false}
      MIN_PASSWORD_LENGTH: ${MIN_PASSWORD_LENGTH:-10}
      MAX_JSON_BODY_BYTES: ${MAX_JSON_BODY_BYTES:-2097152}
      MAX_MULTIPART_BODY_BYTES: ${MAX_MULTIPART_BODY_BYTES:-8388608}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      SCHEDULER_ENABLED: "false"
      ENABLE_LEGACY_PENDING_PAYMENT_FOLLOWUP: "false"
      ENABLE_WHATSAPP: ${ENABLE_WHATSAPP:-false}
      ENABLE_AI_ACTIONS: ${ENABLE_AI_ACTIONS:-false}
      ENABLE_CAMPAIGNS: ${ENABLE_CAMPAIGNS:-false}
      ENABLE_WORKFLOWS: ${ENABLE_WORKFLOWS:-false}
      ENABLE_BILLING: ${ENABLE_BILLING:-false}
      ENABLE_MARKETPLACE_IMPORT: ${ENABLE_MARKETPLACE_IMPORT:-false}
      ENABLE_AI_QUALITY: ${ENABLE_AI_QUALITY:-true}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_GRAPH_VERSION: ${WHATSAPP_GRAPH_VERSION:-v20.0}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES:-false}
      ARQ_MAX_JOBS: ${ARQ_MAX_JOBS:-2}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - model_cache:/root/.cache
      - uploads:/app/uploads

  # ── ARQ Worker (Background Jobs) ──
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jualin-worker
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://jualin:${DB_PASSWORD:-jualin_secure_2026}@db:5432/jualin_ai
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-jualin-secret-change-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-secret-change-in-production}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:20128/v1}
      LLM_API_KEY: ${LLM_API_KEY:-not-needed}
      LLM_MODEL: ${LLM_MODEL:-llama-3.1-8b-instant}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEBUG: ${DEBUG:-false}
      MIN_PASSWORD_LENGTH: ${MIN_PASSWORD_LENGTH:-10}
      MAX_JSON_BODY_BYTES: ${MAX_JSON_BODY_BYTES:-2097152}
      MAX_MULTIPART_BODY_BYTES: ${MAX_MULTIPART_BODY_BYTES:-8388608}
      SCHEDULER_ENABLED: "false"
      ENABLE_LEGACY_PENDING_PAYMENT_FOLLOWUP: "false"
      AUTO_CREATE_TABLES: "false"
      ARQ_MAX_JOBS: ${ARQ_MAX_JOBS:-2}
      ENABLE_WHATSAPP: ${ENABLE_WHATSAPP:-false}
      ENABLE_AI_ACTIONS: ${ENABLE_AI_ACTIONS:-false}
      ENABLE_CAMPAIGNS: ${ENABLE_CAMPAIGNS:-false}
      ENABLE_WORKFLOWS: ${ENABLE_WORKFLOWS:-false}
      ENABLE_BILLING: ${ENABLE_BILLING:-false}
      ENABLE_MARKETPLACE_IMPORT: ${ENABLE_MARKETPLACE_IMPORT:-false}
      ENABLE_AI_QUALITY: ${ENABLE_AI_QUALITY:-true}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_GRAPH_VERSION: ${WHATSAPP_GRAPH_VERSION:-v20.0}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
    command: ["arq", "worker.WorkerSettings"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - model_cache:/root/.cache
      - uploads:/app/uploads

  # ── Frontend (Next.js) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        INTERNAL_API_URL: http://backend:8000
    container_name: jualin-frontend
    restart: always
    depends_on:
      - backend
    environment:
      HOSTNAME: "0.0.0.0"
      INTERNAL_API_URL: http://backend:8000
    ports:
      - "127.0.0.1:3000:3000"

  # ── Nginx (Production only) ──
  nginx:
    image: nginx:alpine
    container_name: jualin-nginx
    restart: always
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  pgdata:
  redisdata:
  model_cache:
  uploads:
